services:
  db:
    image: postgres:14
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: password

  web:
    build: .
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails s -e development -b 0.0.0.0"
    volumes:
     - .:/rails
    ports:
     - "3000:3000"
    depends_on:
     - db
    environment:
     DATABASE_HOST: db
     DATABASE_USERNAME: postgres
     DATABASE_PASSWORD: password
     RAILS_ENV: development

volumes:
  postgres_data: